<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>记账助手</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="记账">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='32' fill='%231a1a2e'/><text x='96' y='120' text-anchor='middle' font-size='80' fill='%23c9a96e'>￥</text></svg>">
<link rel="manifest" href="chat-manifest.json">
<style>
:root {
  --bg: #111;
  --card: #1a1a1a;
  --gold: #c9a96e;
  --user-bubble: #c9a96e;
  --bot-bubble: #222;
  --text: #e0e0e0;
  --sub: #888;
  --red: #E74C3C;
  --blue: #3498DB;
  --green: #2ECC71;
  --purple: #8E44AD;
  --orange: #E67E22;
  --cyan: #1ABC9C;
  --yellow: #F1C40F;
  --pink: #E91E63;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* 顶部栏 */
header {
  background: var(--card);
  padding: 12px 16px;
  text-align: center;
  border-bottom: 1px solid #2a2a2a;
  position: sticky;
  top: 0;
  z-index: 10;
  padding-top: env(safe-area-inset-top, 12px);
}
header h1 { font-size: 16px; color: var(--gold); font-weight: 600; }
header p { font-size: 11px; color: var(--sub); margin-top: 1px; }

/* 快捷按钮 */
.quick-btns {
  display: flex;
  gap: 6px;
  padding: 8px 12px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  border-bottom: 1px solid #2a2a2a;
  flex-shrink: 0;
}
.quick-btns::-webkit-scrollbar { display: none; }
.quick-btn {
  flex-shrink: 0;
  padding: 6px 12px;
  border-radius: 16px;
  border: 1px solid #3a3a3a;
  background: var(--card);
  color: var(--text);
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
}
.quick-btn:active { background: var(--gold); color: #000; border-color: var(--gold); }

/* 消息区 */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  -webkit-overflow-scrolling: touch;
}
.msg {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.5;
  word-break: break-word;
  white-space: pre-wrap;
}
.msg.user {
  align-self: flex-end;
  background: var(--user-bubble);
  color: #000;
  border-bottom-right-radius: 4px;
}
.msg.bot {
  align-self: flex-start;
  background: var(--bot-bubble);
  border-bottom-left-radius: 4px;
}
.msg.loading {
  background: var(--bot-bubble);
  opacity: 0.5;
}
.cat-tag {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 11px;
  margin-right: 4px;
  font-weight: 600;
}

/* 输入区 */
#input-area {
  display: flex;
  gap: 8px;
  padding: 10px 12px;
  border-top: 1px solid #2a2a2a;
  background: var(--card);
  padding-bottom: env(safe-area-inset-bottom, 10px);
  flex-shrink: 0;
}
#input-area input {
  flex: 1;
  padding: 10px 14px;
  border-radius: 20px;
  border: 1px solid #3a3a3a;
  background: #000;
  color: var(--text);
  font-size: 14px;
  outline: none;
  -webkit-appearance: none;
}
#input-area input:focus { border-color: var(--gold); }
#input-area button {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: var(--gold);
  color: #000;
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
#input-area button:active { opacity: 0.8; }

/* 安装提示 */
#install-hint {
  display: none;
  background: #2a2a2a;
  color: var(--gold);
  text-align: center;
  padding: 10px;
  font-size: 13px;
  cursor: pointer;
}
</style>
</head>
<body>

<header>
  <h1>记账助手</h1>
  <p>记账 · 查攻略 · 查账单</p>
</header>

<div id="install-hint" onclick="this.style.display='none'">将本页添加到桌面，使用更方便</div>

<div class="quick-btns" id="quickBtns">
  <button class="quick-btn" data-text="汇总">汇总</button>
  <button class="quick-btn" data-text="本月">本月</button>
  <button class="quick-btn" data-text="帮助">帮助</button>
</div>

<div id="messages"></div>

<div id="input-area">
  <input id="input" type="text" placeholder="羊肉面：18元，打车：25元" autocomplete="off" enterkeyhint="send">
  <button id="sendBtn">➤</button>
</div>

<script>
const API = "https://travel-d6gc9rtii6d0f6a87-1439099044.ap-shanghai.app.tcloudbase.com/wechat";

// 从 localStorage 获取或创建 userId
let userId = localStorage.getItem("chat_userId");
if (!userId) {
  userId = "web_" + Date.now() + "_" + Math.random().toString(36).substr(2, 6);
  localStorage.setItem("chat_userId", userId);
}

const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");

// 分类颜色
const catColors = {
  "餐饮":"#E74C3C","交通":"#3498DB","日用品":"#2ECC71","服饰":"#8E44AD",
  "数码":"#3498DB","家居":"#F39C12","个护":"#E91E63","住房":"#F39C12",
  "娱乐":"#9B59B6","医疗":"#E67E22","车载装备":"#1ABC9C","户外用品":"#27AE60",
  "途中补给":"#F1C40F","其他":"#95A5A6"
};

function addMessage(text, type) {
  const el = document.createElement("div");
  el.className = `msg ${type}`;
  // 给 bot 消息中的分类上色
  if (type === "bot") {
    text = text.replace(/^([^\s|]+)(\s*\|)/gm, (m, cat) => {
      const color = catColors[cat] || "#95A5A6";
      return `<span class="cat-tag" style="background:${color}">${cat}</span> |`;
    });
    // URL 转为可点击链接
    text = text.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:#3498DB;word-break:break-all">$1</a>');
  }
  el.innerHTML = text;
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return el;
}

function addLoading() {
  const el = document.createElement("div");
  el.className = "msg bot loading";
  el.textContent = "···";
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return el;
}

async function send(message) {
  const text = message || inputEl.value.trim();
  if (!text) return;
  if (!message) inputEl.value = "";

  addMessage(text, "user");
  const loadingEl = addLoading();

  try {
    const resp = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, userId }),
    });
    const data = await resp.json();
    loadingEl.remove();
    addMessage(data.reply || "无回复", "bot");
  } catch (e) {
    loadingEl.remove();
    addMessage("网络错误，请重试", "bot");
  }
}

// 发送按钮
sendBtn.addEventListener("click", () => send());

// 回车发送
inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});

// 快捷按钮
document.getElementById("quickBtns").addEventListener("click", (e) => {
  const btn = e.target.closest(".quick-btn");
  if (!btn) return;
  send(btn.dataset.text);
});

// 首次加载显示欢迎消息
if (!localStorage.getItem("chat_visited")) {
  localStorage.setItem("chat_visited", "1");
  setTimeout(() => {
    addMessage("发送以下内容给我：\n\n记账 羊肉面：18元，打车：25元\n查攻略 太原\n查账单 汇总 / 本月\n系统 帮助", "bot");
  }, 300);
}

// PWA 安装提示（iOS）
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
const isStandalone = window.matchMedia("(display-mode: standalone)").matches || navigator.standalone;
if (isIOS && !isStandalone) {
  setTimeout(() => {
    document.getElementById("install-hint").style.display = "block";
  }, 2000);
}

// 聚焦输入框
inputEl.focus();

// 注册 Service Worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>
</body>
</html>
